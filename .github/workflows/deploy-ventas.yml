name: CI/CD - Backend Ventas

# Se activa solo con push a la rama deploy
on:
  push:
    branches:
      - deploy
    paths:
      - 'back-Ventas_SpringBoot/**'

jobs:
  build-and-deploy:
    name: Build, Push y Deploy - Ventas
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del codigo
      - name: Checkout codigo
        uses: actions/checkout@v4

      # 2. Configurar credenciales AWS
      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 3. Login a Amazon ECR
      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build y Push de la imagen Docker
      - name: Build, tag y push imagen a ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPO_VENTAS }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd back-Ventas_SpringBoot
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # 5. Deploy en EC2 via SSH
      - name: Deploy en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_BACKEND }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            docker pull ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO_VENTAS }}:latest
            docker stop back-ventas || true
            docker rm back-ventas || true
            docker run -d \
              --name back-ventas \
              --restart unless-stopped \
              -p 8081:8081 \
              -e SPRING_DATASOURCE_URL=${{ secrets.DB_URL }} \
              -e SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USER }} \
              -e SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} \
              ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPO_VENTAS }}:latest
